<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="icon" type="image/svg+xml" href="../assets/imgs/logo.svg">
    <link rel="stylesheet" href="../style/contacts.css">
    <link rel="stylesheet" href="../style/sidebar.css">
    <link rel="stylesheet" href="../style/mobile_sidebar.css">
    <link rel="stylesheet" href="../style.css">

    <script defer src="../script.js"></script>
    <script defer src="../script/contacts.js"></script>
    <script defer src="../script/contacts_templates.js"></script>
</head>
<body onload="init(), loadContacts()">
        <div w3-include-html="../assets/templates/header.html"></div>
        <div w3-include-html="../assets/templates/sidebar.html"></div>
        <div w3-include-html="../assets/templates/mobile_sidebar.html"></div>
            
            <div class="main-content">
                <div class="contactListStyle" id="contactListContainer">
                    <button class="addContactBtn" onclick="openModal()"> <span>Add new contact</span> <img src="../assets/imgs/person_add.svg" alt="add person icon"></button>
                    <ul>
                        <li id="contactListContent">
                        </li>
                    </ul>
                </div>
            <div class="sloganAndCard-Container" id="sloganAndCardContainer">
                    <div class="slogan" id="slogan">
                            <h2>Contacts</h2>
                            <img src="../assets/imgs/Vector 5.png" alt="Vector imgage">
                            <span class="sloganSpan">Better with a team</span>
                    </div>
                    <div class="content-slogan displayNone" id="mobileSlogan">
                        <h2>Contacts</h2>
                        <span class="sloganSpan">Better with a team</span>
                        <img src="../assets/imgs/Vector horizontel.png" alt="Vector imgage">
                    </div>
            <div id="contactCard">
                <div id="contactCardContent">
                </div>
            <img id="closeCardBtn" class="displayNone" src="../assets/imgs/vector.svg" alt="close card icon" onclick="closeContactCard()">
            </div>
            </div>
            <dialog id="dialogModal">
                    <div class="leftSideModal" id="leftSideModal">
                        <img class="logoWhite" src="../assets/imgs/logo_white.svg" alt="">
                        <h3>Add contact</h3>
                        <span>Tasks are better with a team!</span>
                            <img class="vectorHorizontel" src="../assets/imgs/Vector horizontel.png" alt="">
                    </div>
                    <div class="rightSideModal">
                        <div class="closeBtnContainer">
                                <button onclick="closeModal()" class="closeBtn"><img src="../assets/imgs/Close.png" alt="close Icon"></button>
                        </div>
                        <div class="imgAndForm">
                                <div id="modalInitials" class="profileImg" alt="profile image"></div>
                                <div id="contactModal"></div>
                        </div>    
                    </div>
                    
                </dialog>

                <div id="successMessage" class="success-message displayNone">
                    <span>Contact successfully created</span>
                </div>
                
</body>
</html>
