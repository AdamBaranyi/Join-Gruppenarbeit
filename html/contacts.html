<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacts</title>
    <link rel="icon" type="image/svg+xml" href="../assets/imgs/logo.svg">
    <link rel="stylesheet" href="../style/contacts.css">
    <link rel="stylesheet" href="../style/contacts_dialog.css">
    <link rel="stylesheet" href="../style/contacts_responsive.css">
    <link rel="stylesheet" href="../style/sidebar.css">
    <link rel="stylesheet" href="../style/mobile_sidebar.css">
    <link rel="stylesheet" href="../style.css">

    <script defer src="../script.js"></script>
    <script defer src="../script/contacts.js"></script>
    <script defer src="../script/contacts_templates.js"></script>
</head>
<body onload="init(), loadContacts()">
        <div w3-include-html="../assets/templates/header.html"></div>
        <div w3-include-html="../assets/templates/sidebar.html"></div>
        <div w3-include-html="../assets/templates/mobile_sidebar.html"></div>
            
            <div class="main-content">
                <div class="contact-list-style" id="contact-list-container">
                    <button class="add-contact-btn" onclick="openModal()"> <span>Add new contact</span> <img src="../assets/imgs/person_add.svg" alt="add person icon"></button>
                    <ul>
                        <li id="contact-list-content">
                        </li>
                    </ul>
                </div>
            <div class="slogan-and-card-container" id="slogan-and-card-container">
                    <div class="slogan" id="slogan">
                            <h2>Contacts</h2>
                            <img src="../assets/imgs/Vector 5.png" alt="Vector imgage">
                            <span class="slogan-span">Better with a team</span>
                    </div>
                    <div class="content-slogan" id="mobile-slogan">
                        <h2>Contacts</h2>
                        <span class="slogan-span">Better with a team</span>
                        <img src="../assets/imgs/Vector horizontel.png" alt="Vector imgage">
                    </div>
            <div id="contact-card">
                <div id="contact-card-content">
                </div>
            <img id="close-card-btn" src="../assets/imgs/vector.svg" alt="close card icon" onclick="closeContactCard()">
            </div>
            </div>
            <dialog id="dialog-modal">
                    <div class="left-side-modal " id="left-side-modal ">
                        <img class="logo-white" src="../assets/imgs/logo_white.svg" alt="">
                        <h3>Add contact</h3>
                        <span>Tasks are better with a team!</span>
                            <img class="vector-horizontel" src="../assets/imgs/Vector horizontel.png" alt="">
                    </div>
                    <div class="right-side-modal">
                        <div class="close-btn-container">
                                <button onclick="closeModal()" class="close-btn"><img id="close-btn-img" src="../assets/imgs/Close.png" alt="close Icon"></button>
                        </div>
                        <div class="img-and-form">
                                <div id="modal-initials" class="profile-img" alt="profile image"></div>
                                <div id="contact-modal"></div>
                        </div>    
                    </div>
                    
                </dialog>

                <div id="success-message" class="success-message display-none">
                    <span>Contact successfully created</span>
                </div>
                
</body>
</html>
