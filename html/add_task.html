<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <link rel="icon" type="image/svg+xml" href="../assets/imgs/logo.svg">
    <link rel="stylesheet" href="../style/add_task.css">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../style/sidebar.css">
    <link rel="stylesheet" href="../style/mobile_sidebar.css">
    <script src="../script.js" defer></script>
    <script src="../script/summary.js" defer></script>
    <script src="../script/add_task.js" defer></script>
</head>

<body onload="init()">
    <div w3-include-html="../assets/templates/header.html"></div>
    <div w3-include-html="../assets/templates/sidebar.html"></div>
    <div w3-include-html="../assets/templates/mobile_sidebar.html"></div>

    <main class="main-container">
        <h1>Add Task</h1>

        <form id="taskForm" onsubmit="return validateForm();">
            <div class="form-container">
                <div class="input-title-container">
                    <labal for="taskTitle" class="title">Title<span class="span-str">*</span></labal>
                    <input type="text" id="task-title" placeholder="Enter a title">
                    <div class="error-msg" id="error-task-title"></div>
                </div>
                <div class="input-desc-container">
                    <label for="taskDescription" class="title">Description</label>
                    <textarea name="txtArea" id="taskDsc" placeholder="Enter a Description"></textarea>
                </div>
                <div class="input-date-container">
                    <label class="title">Due date<span class="span-str">*</span></label>
                    <input type="date" id="due-date" title="Due Date">
                    <div class="error-msg" id="error-due-date"></div>
                </div>

            </div>
            <div class="separator">
                <img src="../assets/imgs/Vector 4.png" alt="Victor-img">
            </div>
            <div class="periority-from-container">
                <div class="bnt-content">
                    <label for="p-lable" class="btn-label">Priority</label>
                    <div class="btns">
                        <!-- <a href="#" class="urgent trigger">Urgent <img class="trigger"
                                src="../assets/imgs/urgent-priority-board.svg" alt="uregent-icon"></a>
                        <a href="#" class="medium trigger">Medium <img class="trigger"
                                src="../assets/imgs/priority_medium.svg" alt="medium-icon"></a>
                        <a href="#" class="low trigger">Low <img class="trigger"
                                src="../assets/imgs/low-priority-board.svg" alt="low-icon"></a> -->


                    <button type="button" class="urgent trigger"  data-priority="urgent">
                        Urgent
                        <svg class="trigger" xmlns="http://www.w3.org/2000/svg" width="17" height="12" fill="none" viewBox="0 0 17 12"><g fill="#ff3d00" clip-path="url(#a)"><path d="M8.5 4.755c.2 0 .394.061.555.176l7.568 5.434a.92.92 0 0 1 .368.595.89.89 0 0 1-.172.673.952.952 0 0 1-1.304.19L8.5 6.793l-7.014 5.03a.95.95 0 0 1-.693.168.95.95 0 0 1-.611-.358.9.9 0 0 1-.172-.673.9.9 0 0 1 .368-.595l7.568-5.434a.95.95 0 0 1 .554-.176"/><path d="M8.5 0c.2 0 .394.061.554.176l7.569 5.434a.888.888 0 0 1 .196 1.268.953.953 0 0 1-1.304.19L8.5 2.039l-7.014 5.03a.953.953 0 0 1-1.304-.19.89.89 0 0 1 .195-1.268L7.946.176A.95.95 0 0 1 8.5 0"/></g><defs><clipPath id="a"><path fill="#fff" d="M17 12H0V0h17z"/></clipPath></defs></svg>
                    </button>

                    <button type="button" class="medium trigger" data-priority="medium">
                        Medium
                      <svg class="trigger" xmlns="http://www.w3.org/2000/svg" width="17" height="7" fill="none" viewBox="0 0 17 7"><g fill="#ffa800" clip-path="url(#a)"><path d="M16.069 6.333H.931a.93.93 0 0 1-.66-.274.94.94 0 0 1 0-1.327.93.93 0 0 1 .66-.275h15.137c.247 0 .483.099.658.275a.94.94 0 0 1 0 1.327.93.93 0 0 1-.659.274M16.069 1.877H.931a.93.93 0 0 1-.66-.275.94.94 0 0 1 0-1.327A.93.93 0 0 1 .933 0h15.137c.247 0 .483.099.658.275a.94.94 0 0 1 0 1.327.93.93 0 0 1-.659.275"/></g><defs><clipPath id="a"><path fill="#fff" d="M0 0h17v6.333H0z"/></clipPath></defs></svg>
                    </button>

                    <button type="button" class="low trigger" data-priority="low">
                        Low
                     <svg class="trigger" xmlns="http://www.w3.org/2000/svg" width="17" height="12" fill="none" viewBox="0 0 17 12"><path fill="#7ae229" d="M8.5 7.245a.95.95 0 0 1-.555-.176L.377 1.635a.92.92 0 0 1-.368-.595.89.89 0 0 1 .172-.673.953.953 0 0 1 1.304-.19L8.5 5.207l7.014-5.03a.95.95 0 0 1 .693-.168.95.95 0 0 1 .611.358.9.9 0 0 1 .172.673.9.9 0 0 1-.367.595L9.054 7.069a.95.95 0 0 1-.554.176"/><path fill="#7ae229" d="M8.5 12a.95.95 0 0 1-.554-.177L.377 6.39a.888.888 0 0 1-.196-1.268.953.953 0 0 1 1.304-.19L8.5 9.961l7.014-5.03a.953.953 0 0 1 1.304.19.89.89 0 0 1-.195 1.268l-7.569 5.434A.95.95 0 0 1 8.5 12"/></svg>
                    </button>
                    </div>
                    
                    
                </div>
                <div class="assigned-container">
                    <label for="assignedDropdown" class="assigned-dropdown">Assigned to</label>
                    <select name="select" id="assignedDropdown" title="Assign to a person">
                        <option value="" disabled selected>Select contact to assign</option>
                        <option value="person2">Person 2</option>
                        <option value="person3">Person 3</option>
                    </select>
                </div>
                <div class="category-conrainer">
                    <label for="categoryDropdown" class="assigned-dropdown">Category<span
                            class="span-str">*</span></label>
                    <select name="select" id="categoryDropdown" title="Select a category">
                        
                        <option value="person1">Technical Task</option>
                        <option value="person2">User Story</option>
                    </select>
                </div>
                <div class="subtask-conrainer">
                    <label for="subtask" class="assigned-dropdown">Subtasks</label>
                    <input type="text" id="subTask" placeholder="Add a new subtask" required>
                </div>
            </div>
    </main>

    <footer>
        <div class="footer-container">
            <p><span class="span-str">*</span>This field is required</p>
            <div class="btn-footer">
                <button type="reset" class="clear-btn">Clear <img src="../assets/imgs/iconoir_cancel.svg"
                        alt="CreateBtn"></button>
                <button type="submit" class="create-btn">Create Task<img src="../assets/imgs/check.svg"
                        alt="ClearBtn"></button>
            </div>
        </div>
    </footer>
    </form>
</body>

</html>
