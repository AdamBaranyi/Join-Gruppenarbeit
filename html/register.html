<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="register.css">
  <script src="register.js" defer></script>
</head>

<body>

  <header>
    <img src="imgs/Capa 2.svg" alt="JLogo" class="logo" />
  </header>

  <main class="container">
    <div class="card">
      <div class="title-row">
        <a href="login.html"><img class="back-arrow" src="imgs/arrow-left-line.png" alt="back-arrow"></a>
        <h1>Sign up</h1>
      </div>

      <div class="underline"></div>

      <form onsubmit="addUser();return false;">
        <div class="input-group" data-type="text">
          <input type="text" id="username" placeholder="Name" required />
          <img class="input-icon" src="imgs/person.png" alt="PrsonIcon">
        </div>

        <div class="input-group" data-type="email">
          <input type="email" id="email" placeholder="Email" required />
          <img class="input-icon" src="imgs/mail.png" alt="mailIocn">
        </div>

        <div class="input-group" data-type="password">
          <input type="password" id="password" placeholder="Password" required />
          <img class="input-icon" src="imgs/lock.png" alt="lcokIocn" data-default="imgs/lock.svg" data-visible="\imgs\eye-off-line.svg"
            data-hidden="\imgs\eye-line.svg">
        </div>

        <div class="input-group" data-type="password">
          <input type="password" id="confirmepsw" placeholder="Confirm Password" required />
          <img class="input-icon" src="imgs/lock (1).png" alt="lockIcon" data-default="imgs/lock.svg"
            data-visible="\imgs\eye-off-line.svg" data-hidden="\imgs\eye-line.svg">
        </div>

        <div class="privacy">
          <input class="checkbox" type="checkbox" required />
          <span>I accept the <a href="#">Privacy policy</a></span>
        </div>

        <button type="submit">Sign up</button>
      </form>
    </div>
  </main>

  <footer>
    <a href="#">Privacy Policy</a>
    <a href="#">Legal notice</a>
  </footer>

</body>

</html>
