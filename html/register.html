<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/style/register.css" />
  </head>
  <body>
    <div class="logo">
      <img src="/esstes/imgs/Capa 2.svg" alt="Logo" />
    </div>
    <div class="container">
      <h1>Sign Up</h1>
      <form action="" method="post">
        <label for="name">Name</label>
        <input
          type="text"
          placeholder="Name"
          name="email"
          id="email"
          required
        />
        <label for="email">Email</label>
        <input
          type="text"
          placeholder="Email"
          name="email"
          id="email"
          required
        />

        <label for="psw">Password</label>
        <input
          type="password"
          placeholder="Password"
          name="psw"
          id="psw"
          required
        />

        <label for="psw-repeat">Confire Passowrd</label>
        <input
          type="password"
          placeholder="Confire Password"
          name="psw-repeat"
          id="psw-repeat"
          required
        />

        <button type="submit" class="registerbtn">Sign Up</button>
      </form>
    </div>
  </body>
</html>
