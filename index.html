<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join - Login</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./style/login.css" />
    <link rel="icon" type="image/svg+xml" href="./assets/imgs/logo.svg" />

    <script src="./script.js"></script>
    <script src="./script/login.js"></script>
  </head>

  <body onload="init()">
    <div class="login-container">
      <div class="logo-container">
        <div class="logo-anim">
            <img src="./assets/imgs/logo.svg" alt="Join Logo" class="logo-colored" />
            <img src="./assets/imgs/logo_white.svg" alt="Join Logo" class="logo-white" />
        </div>
      </div>

      <header class="top-signup-link">
        <span>Not a Join user?</span>
        <a
          href="./html/register.html"
          class="btn-dark"
          style="text-decoration: none"
          >Sign up</a
        >
      </header>

      <main class="login-card">
        <h1>Login</h1>
        <div class="separator-blue"></div>

        <form onsubmit="handleLogin(event)" novalidate>
          <div class="input-group" id="emailGroup">
            <input type="email" id="loginEmail" placeholder="Email" />
            <img src="./assets/imgs/mail.svg" alt="Email" />
          </div>

          <div class="input-group" id="passwordGroup">
            <input
              type="password"
              id="loginPassword"
              placeholder="Password"
            />
            <div
              id="passwordToggle"
              onclick="togglePasswordVisibility()"
              class="password-toggle"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="#2A3647"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                ></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </div>
            <img src="./assets/imgs/lock.svg" alt="Lock" />
          </div>
          <span id="loginError" class="login-error-msg d-none">Check your email and password. Please try again.</span>

          <div class="login-buttons">
            <button type="submit" class="btn-dark">Log In</button>
            <button type="button" class="btn-light" onclick="guestLogin()">
              Guest Log In
            </button>
          </div>
        </form>
      </main>

      <footer class="legal-links">
        <a href="./html/privacy_policy.html">Privacy Policy</a>
        <a href="./html/legal_notice.html">Legal notice</a>
      </footer>

      <div id="successMessage" class="success-message d-none">
        <span>Login Successful</span>
      </div>
    </div>
  </body>
</html>
