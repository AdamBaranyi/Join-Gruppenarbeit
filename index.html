<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join - Login</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./style/login.css" />
    <link rel="icon" type="image/svg+xml" href="./assets/imgs/logo.svg" />

    <script src="./script/config.js"></script>
    <script src="./script.js"></script>
    <script src="./script/login.js"></script>
  </head>

  <body onload="init()">
    <script>
      if (localStorage.getItem('animationPlayed')) {
        document.body.classList.add('no-anim');
      }
    </script>
    <div class="page-wrapper">
    <div class="login-container">
      <div class="logo-container">
        <div class="logo-anim">
            <img src="./assets/imgs/logo.svg" alt="Join Logo" class="logo-colored" />
            <img src="./assets/imgs/logo_white.svg" alt="Join Logo" class="logo-white" />
        </div>
      </div>

      <header class="top-signup-link">
        <span>Not a Join user?</span>
        <a
          href="./html/register.html"
          class="btn-dark"
          style="text-decoration: none"
          >Sign up</a
        >
      </header>

      <main class="login-card">
        <h1>Login</h1>
        <div class="separator-blue"></div>

        <form onsubmit="handleLogin(event)" novalidate>
          <div class="input-group" id="emailGroup">
            <input type="email" id="loginEmail" placeholder="Email" autocomplete="email"/>
            <img src="./assets/imgs/mail.svg" alt="Email" />
          </div>

          <div class="input-group" id="passwordGroup">
            <input
              type="password"
              id="loginPassword"
              placeholder="Password"
              autocomplete="current-password"
              oninput="handleLoginPasswordInput()"
            />
            <img 
              src="./assets/imgs/lock.svg" 
              alt="Toggle Password Visibility" 
              id="passwordToggleIcon"
              class="login-password-icon"
              onclick="togglePasswordVisibility()"
            />
          </div>
          <span id="loginError" class="login-error-msg"></span>

          <div class="login-buttons">
            <button type="submit" class="btn-dark">Log In</button>
            <button type="button" class="btn-light" onclick="guestLogin()">
              Guest Log In
            </button>
          </div>
        </form>
      </main>

      <footer class="legal-links">
        <a href="./html/privacy_policy.html">Privacy Policy</a>
        <a href="./html/legal_notice.html">Legal notice</a>
      </footer>

      <div id="successMessage" class="success-message d-none">
        <span>Login Successful</span>
      </div>
    </div>
    </div>
  </body>
</html>
